# =============================================================================
# CyberTwin SOC — Continuous Integration & Delivery
# =============================================================================
#
# This workflow is the production quality gate. Every push to master / main /
# develop runs nine jobs in parallel; the final quality-gate job blocks the
# merge unless ALL prerequisite jobs pass.
#
# Jobs (left → right reflects the dependency graph):
#
#   backend-tests        — pytest + coverage on SQLite (fast)
#   postgres-migration   — alembic upgrade/downgrade smoke against PG 16
#   frontend-build       — npm ci + npm run build + Lighthouse
#   lint                 — flake8 (blocking) + black (advisory)
#   security             — pip-audit + gitleaks + npm audit (BLOCKING)
#                          + bandit + semgrep + trivy + sbom (informational)
#   docker               — compose config + build + smoke run + healthcheck
#   helm-lint            — helm lint + render + manifest artefact
#   checkov              — IaC scanning on Dockerfile + Helm
#   quality-gate         — meta-job: requires every above job to be green
#
# Proof artefacts:  see docs/proof/  (one .md per claim)
# =============================================================================

name: CyberTwin SOC CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # 1. Backend Tests — pytest + coverage (SQLite, fast feedback)
  # ---------------------------------------------------------------------------
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage (XML + HTML + JUnit)
        run: |
          python -m pytest tests/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=pytest-junit.xml \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true   # Codecov flakes occasionally; not a blocker

      - name: Upload pytest report (JUnit XML + coverage HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ github.sha }}
          path: |
            pytest-junit.xml
            coverage.xml
            htmlcov/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. PostgreSQL Migration Smoke — Alembic forward + rollback + index check
  # ---------------------------------------------------------------------------
  # Proves the SQLAlchemy schema and Alembic migrations apply cleanly to a
  # real PostgreSQL 16 instance — both forward AND backward — and that every
  # `tenant_id` column is index-covered. The functional test suite still runs
  # on SQLite (cheaper); this job is the production-DB safety net.
  # ---------------------------------------------------------------------------
  postgres-migration:
    runs-on: ubuntu-latest
    name: PostgreSQL Migration Smoke

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cybertwin
          POSTGRES_PASSWORD: cybertwin
          POSTGRES_DB: cybertwin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://cybertwin:cybertwin@localhost:5432/cybertwin_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 15); do
            pg_isready -h localhost -p 5432 -U cybertwin && exit 0
            sleep 2
          done
          echo "::error::PostgreSQL did not become ready in time."
          exit 1

      - name: Apply migrations forward (alembic upgrade head)
        run: alembic upgrade head

      - name: Verify all expected tables exist
        run: |
          python <<'PY'
          import os
          from sqlalchemy import create_engine, inspect

          engine = create_engine(os.environ['DATABASE_URL'])
          insp = inspect(engine)
          tables = set(insp.get_table_names())
          expected = {
              'simulation_runs', 'security_events', 'alerts', 'soc_cases',
              'case_comments', 'case_evidence', 'alert_feedback',
              'suppressions', 'audit_log_v2', 'alembic_version',
          }
          missing = expected - tables
          assert not missing, f'Missing tables: {missing}. Found: {sorted(tables)}'
          print(f'OK: {len(tables)} tables created.')
          PY

      - name: Verify tenant_id index coverage
        run: |
          python <<'PY'
          import os
          from sqlalchemy import create_engine, inspect

          engine = create_engine(os.environ['DATABASE_URL'])
          insp = inspect(engine)
          gaps = []
          for tbl in insp.get_table_names():
              if tbl == 'alembic_version':
                  continue
              cols = {c['name'] for c in insp.get_columns(tbl)}
              if 'tenant_id' not in cols:
                  continue
              idx = insp.get_indexes(tbl)
              covered = any('tenant_id' in i['column_names'] for i in idx)
              if not covered:
                  gaps.append(tbl)
          assert not gaps, f'Tables missing tenant_id index: {gaps}'
          print('OK: every tenant_id column is indexed.')
          PY

      - name: Roll back fully (alembic downgrade base)
        run: alembic downgrade base

      - name: Re-apply forward (idempotency check)
        run: alembic upgrade head

  # ---------------------------------------------------------------------------
  # 3. Frontend Build — npm ci + production build + Lighthouse audit
  # ---------------------------------------------------------------------------
  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

      - name: Report bundle size
        working-directory: frontend
        run: |
          echo "Bundle sizes:"
          du -sh dist/assets/*.js dist/assets/*.css

      - name: Lighthouse CI (perf / a11y / best-practices)
        working-directory: frontend
        # Soft-fail today: gate hardens in v3.3 once perf budget is locked.
        continue-on-error: true
        run: |
          npm install --no-save @lhci/cli@0.14.x
          npx lhci autorun --config=.lighthouserc.json || true

      - name: Upload Lighthouse report (artefact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.sha }}
          path: frontend/.lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 4. Code Quality — flake8 (BLOCKING) + black (advisory)
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install flake8 black --quiet

      - name: Check formatting (black) [advisory]
        # TODO: drop continue-on-error once the codebase is fully reformatted.
        run: black --check --line-length 120 backend/
        continue-on-error: true

      - name: Lint (flake8) [BLOCKING]
        # Ignored, with rationale:
        #   E501  long line   (we already enforce max-line-length=120)
        #   W503  line break before binary operator (PEP8 reversed its stance)
        #   E402  module-level import not at top  (sys.path setup pattern)
        #   E241  multiple spaces after ','  (intentional in tabular MITRE catalog)
        #   E231  missing whitespace after ','  (intentional in mitre/generate_bundle)
        #   E704  statement on same line as def  (intentional for stub abstract methods)
        # Every real bug class (F4xx/F5xx/F6xx/F8xx, E741, …) IS enforced.
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --ignore=E501,W503,E402,E241,E231,E704 \
            --count

  # ---------------------------------------------------------------------------
  # 5. Security Scans — multi-tool, mixed blocking / advisory
  # ---------------------------------------------------------------------------
  # Blocking gates (failure of any === build red):
  #     pip-audit          — Python CVEs
  #     Gitleaks           — verified secrets in git history
  #     npm audit (high+)  — frontend CVEs
  #     Bandit (high-conf) — Python static analysis, high-confidence only
  #
  # Advisory (run on every push, surfaced in summary, do not fail the build):
  #     Semgrep            — multi-language SAST, ERROR-severity
  #     Trivy FS           — filesystem CVE scan (uses ignore-unfixed)
  #     Checkov            — Dockerfile / Helm IaC (separate job)
  #
  # Artefacts (informational, retained 30 d):
  #     CycloneDX SBOM     — Python + npm
  # ---------------------------------------------------------------------------
  security:
    runs-on: ubuntu-latest
    name: Security Scans
    permissions:
      contents: read
      security-events: write   # for SARIF upload

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Gitleaks needs the full git history

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python scanners
        run: pip install bandit pip-audit cyclonedx-bom --quiet

      # --- BLOCKING GATES ------------------------------------------------

      - name: Bandit — high-confidence high-severity Python issues [BLOCKING]
        # `-iii -lll` enables ONLY high-confidence high-severity findings, so
        # the noisy medium / low buckets stay advisory below.
        # `--skip B101,B104` keeps assert and 0.0.0.0 bind out of the gate
        # (both are intentional in this codebase: assert is for tests, 0.0.0.0
        # is needed for compose / k8s).
        run: bandit -r backend/ -iii -lll --skip B101,B104

      - name: pip-audit — CVE scan on Python deps [BLOCKING]
        # Baseline: 0 known CVEs after the Apr 2026 dep upgrade. A new CVE
        # in any pinned version fails the build, forcing a bump.
        # We also export the JSON report as an artefact for traceability.
        run: |
          pip-audit -r requirements.txt --strict
          pip-audit -r requirements.txt -f json -o pip-audit-report.json || true

      - name: Gitleaks — secret scanning [BLOCKING]
        # Any secret matching .gitleaks.toml fails the build. Baseline:
        # 0 verified secrets after the JWT-secret incident fix.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm audit — frontend deps [BLOCKING on high+]
        working-directory: frontend
        run: npm audit --audit-level=high

      # --- ADVISORY (runs on every push, soft-failed for now) ------------

      - name: Bandit — full report [advisory]
        # Surfaces medium / low findings for tracking; does not gate the build.
        # When the medium bucket is baseline-clean we promote this to BLOCKING
        # by removing the `|| true` and lowering the severity flags.
        run: bandit -r backend/ -ll --skip B101,B104 -f txt || true

      - name: Semgrep — multi-language SAST (Python + JS) [advisory]
        # `--severity=ERROR` filters to ERROR-class findings only. We will
        # promote this to a blocking gate once the existing ERROR backlog is
        # zero, see ROADMAP.md.
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep:latest \
            semgrep --config=p/security-audit \
                    --config=p/python \
                    --config=p/javascript \
                    --severity=ERROR \
                    --error \
                    || true

      - name: Trivy — filesystem CVE scan [advisory, SARIF artefact]
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          format: sarif
          output: trivy-fs.sarif

      - name: Trivy — also produce a human-readable JSON report
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: json
          output: trivy-fs.json
          exit-code: '0'

      - name: Bandit — JSON report (artefact)
        run: bandit -r backend/ -ll --skip B101,B104 -f json -o bandit-report.json || true

      - name: Upload security reports (Bandit JSON + Trivy SARIF/JSON + pip-audit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            bandit-report.json
            trivy-fs.sarif
            trivy-fs.json
            pip-audit-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Trivy SARIF to GitHub code scanning (advisory)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-fs.sarif

      # --- SBOM artefacts (mandatory, retained 30 d) ---------------------

      - name: CycloneDX SBOM — Python
        run: |
          cyclonedx-py requirements -i requirements.txt \
            -o sbom-python.json --output-format json || true

      - name: CycloneDX SBOM — Frontend
        working-directory: frontend
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-file ../sbom-frontend.json || true

      - name: Upload SBOM artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-python.json
            sbom-frontend.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # 6. Docker Build — compose config + build + healthcheck smoke
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Create compose .env (test-only secrets)
        # `.env` is git-ignored; we create a stub so `env_file` is satisfied
        # and the production-safety gate gets strong test-only secrets.
        run: |
          cat > .env <<'EOF'
          ENV=production
          JWT_SECRET=ci-only-secret-for-compose-validation-0000000000000000000000000000
          AUTH_ADMIN_PASSWORD=ci-admin-password-0000
          AUTH_ANALYST_PASSWORD=ci-analyst-password-0000
          AUTH_VIEWER_PASSWORD=ci-viewer-password-0000
          EOF

      - name: Validate compose configurations
        # Fails fast on typos / unknown keys / variable interpolation errors
        # before we waste time on `build`.
        run: |
          docker compose config > /dev/null
          docker compose --profile soar config > /dev/null
          echo "All compose configurations are valid."

      - name: Build default stack
        run: docker compose build

      - name: Start default stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health > /dev/null; then
              echo "Backend is healthy after ${i} attempt(s)."
              exit 0
            fi
            echo "::group::Attempt ${i}/30 — waiting 5s for backend..."
            docker compose ps
            docker compose logs backend --tail=20 || true
            echo "::endgroup::"
            sleep 5
          done
          echo "::error::Backend did not become healthy in time."
          exit 1

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost/health > /dev/null; then
              echo "Frontend is healthy after ${i} attempt(s)."
              exit 0
            fi
            echo "Attempt ${i}/12 — waiting 5s for frontend (port 80→8080)..."
            sleep 5
          done
          echo "::error::Frontend did not become healthy in time."
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          for svc in backend frontend redis; do
            echo "::group::${svc} logs"
            docker compose logs $svc --tail=200 || true
            echo "::endgroup::"
          done
          docker compose ps

      - name: Stop services
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # 7. Helm Chart Validation — lint + render + artefact upload
  # ---------------------------------------------------------------------------
  helm-lint:
    runs-on: ubuntu-latest
    name: Helm Chart Validation
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: helm lint deploy/helm/cybertwin-soc

      - name: Render Helm templates (smoke test)
        run: |
          helm template cybertwin deploy/helm/cybertwin-soc \
            --set ingress.host=ci.example.com \
            --set serviceMonitor.enabled=true \
            > /tmp/rendered.yaml
          echo "Rendered manifest size:"
          wc -l /tmp/rendered.yaml

      - name: Upload rendered manifest as artefact
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered-${{ github.sha }}
          path: /tmp/rendered.yaml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 8. Checkov IaC Security Scan — Dockerfile + Helm
  # ---------------------------------------------------------------------------
  # Currently advisory (soft_fail: true). Will be promoted to BLOCKING for
  # CRITICAL findings in v3.3 once the existing CRITICAL backlog is zero.
  # ---------------------------------------------------------------------------
  checkov:
    runs-on: ubuntu-latest
    name: Checkov IaC Security Scan
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Dockerfile + secrets
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,secrets
          quiet: true
          soft_fail: true   # advisory until v3.3

      - name: Run Checkov on Helm templates
        uses: bridgecrewio/checkov-action@master
        with:
          directory: deploy/helm
          framework: helm
          quiet: true
          soft_fail: true   # advisory until v3.3

  # ---------------------------------------------------------------------------
  # 9. Quality Gate — meta-job, blocks merges unless every gate is green
  # ---------------------------------------------------------------------------
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate
    needs:
      - backend-tests
      - postgres-migration
      - frontend-build
      - lint
      - security
      - docker
      - helm-lint

    steps:
      - name: All required quality gates passed
        run: |
          echo "=========================================="
          echo "  CyberTwin SOC Quality Gate: PASSED"
          echo "=========================================="
          echo "  backend-tests       : OK"
          echo "  postgres-migration  : OK"
          echo "  frontend-build      : OK"
          echo "  lint                : OK"
          echo "  security            : OK"
          echo "  docker              : OK"
          echo "  helm-lint           : OK"
          echo "=========================================="
