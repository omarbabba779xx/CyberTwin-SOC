name: CyberTwin SOC CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=backend --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          echo "Bundle sizes:"
          du -sh dist/assets/*.js dist/assets/*.css

  lint:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install flake8 black --quiet

      - name: Check formatting (black) [warn-only for now]
        # TODO: drop continue-on-error once the codebase is fully reformatted.
        run: black --check --line-length 120 backend/
        continue-on-error: true

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length=120 --ignore=E501,W503,E402 --count

  security:
    runs-on: ubuntu-latest
    name: Security Scans (non-blocking)
    permissions:
      contents: read
      security-events: write   # for SARIF upload

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python scanners
        run: pip install bandit pip-audit cyclonedx-bom semgrep --quiet

      - name: Bandit — Python static security analysis
        run: bandit -r backend/ -ll --skip B101,B104 -f txt || true

      - name: pip-audit — CVE scan on Python dependencies
        run: pip-audit -r requirements.txt --strict || true

      - name: Semgrep — multi-language SAST (Python + JS)
        run: semgrep --config=p/security-audit --config=p/python --config=p/javascript --error || true

      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm audit — frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Trivy — filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: CycloneDX SBOM — Python
        run: cyclonedx-py requirements -i requirements.txt -o sbom-python.json --output-format json || true

      - name: CycloneDX SBOM — Frontend
        working-directory: frontend
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-python.json
            sbom-frontend.json
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8000/api/health || exit 1
          echo "Backend healthy!"

      - name: Stop services
        run: docker compose down
