name: CyberTwin SOC CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=backend --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          echo "Bundle sizes:"
          du -sh dist/assets/*.js dist/assets/*.css

  lint:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install flake8 black --quiet

      - name: Check formatting (black)
        run: black --check --line-length 120 backend/ || true

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length=120 --ignore=E501,W503,E402 --count

  docker:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: |
          docker compose up -d
          sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8000/api/health || exit 1
          echo "Backend healthy!"

      - name: Stop services
        run: docker compose down
