name: CyberTwin SOC CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=backend --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          echo "Bundle sizes:"
          du -sh dist/assets/*.js dist/assets/*.css

  lint:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install flake8 black --quiet

      - name: Check formatting (black) [warn-only for now]
        # TODO: drop continue-on-error once the codebase is fully reformatted.
        run: black --check --line-length 120 backend/
        continue-on-error: true

      - name: Lint (flake8)
        # Ignored:
        #   E501 long line (handled separately via max-line-length)
        #   W503 line break before binary operator (PEP8 reversed its stance)
        #   E402 module-level import not at top (needed for sys.path setup)
        #   E241 multiple spaces after ',' (intentional in tabular MITRE catalog)
        #   E231 missing whitespace after ',' (intentional in mitre/generate_bundle)
        #   E704 statement on same line as def (intentional for abstract method stubs)
        #   E704/E241/E231 flagged code is reviewed and intentional;
        #   real bugs (F4xx/F5xx/F6xx/F8xx, E741) ARE enforced.
        run: flake8 backend/ --max-line-length=120 --ignore=E501,W503,E402,E241,E231,E704 --count

  security:
    runs-on: ubuntu-latest
    name: Security Scans (non-blocking)
    permissions:
      contents: read
      security-events: write   # for SARIF upload

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python scanners
        run: pip install bandit pip-audit cyclonedx-bom --quiet

      - name: Bandit — Python static security analysis
        run: bandit -r backend/ -ll --skip B101,B104 -f txt || true

      - name: pip-audit — CVE scan on Python dependencies
        run: pip-audit -r requirements.txt --strict || true

      - name: Semgrep — multi-language SAST (Python + JS)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep:latest \
            semgrep --config=p/security-audit \
                    --config=p/python \
                    --config=p/javascript \
                    --error || true

      - name: Gitleaks — secret scanning
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm audit — frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high || true

      - name: Trivy — filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: CycloneDX SBOM — Python
        run: cyclonedx-py requirements -i requirements.txt -o sbom-python.json --output-format json || true

      - name: CycloneDX SBOM — Frontend
        working-directory: frontend
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-python.json
            sbom-frontend.json
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env stub
        # `.env` is git-ignored. We create a stub so the compose env_file
        # directive is satisfied on every Compose version (incl. < 2.24
        # which doesn't support `required: false`).
        run: touch .env

      - name: Validate compose config
        # Fails fast on typos / unknown keys / variable interpolation errors
        # before we waste time on `build`.
        run: |
          docker compose config > /dev/null
          docker compose --profile soar config > /dev/null
          docker compose --profile prod-db config > /dev/null
          echo "All compose configurations are valid."

      - name: Build default stack
        run: docker compose build

      - name: Build prod-db profile (Postgres opt-in)
        # Compiles the prod-db profile too so we never ship a broken
        # production manifest. Profile-only services are pulled, not run.
        run: docker compose --profile prod-db build

      - name: Start default stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health > /dev/null; then
              echo "Backend is healthy after ${i} attempt(s)."
              exit 0
            fi
            echo "::group::Attempt ${i}/30 - waiting 5s for backend..."
            docker compose ps
            docker compose logs backend --tail=20 || true
            echo "::endgroup::"
            sleep 5
          done
          echo "Backend did not become healthy in time."
          exit 1

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost/health > /dev/null; then
              echo "Frontend is healthy after ${i} attempt(s)."
              exit 0
            fi
            echo "Attempt ${i}/12 - waiting 5s for frontend..."
            sleep 5
          done
          echo "Frontend did not become healthy in time."
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::backend logs"
          docker compose logs backend --tail=200 || true
          echo "::endgroup::"
          echo "::group::frontend logs"
          docker compose logs frontend --tail=200 || true
          echo "::endgroup::"
          echo "::group::redis logs"
          docker compose logs redis --tail=100 || true
          echo "::endgroup::"
          docker compose ps

      - name: Stop services
        if: always()
        run: docker compose down -v

  helm-lint:
    runs-on: ubuntu-latest
    name: Helm Chart Validation
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: helm lint deploy/helm/cybertwin-soc

      - name: Render Helm templates (smoke test)
        run: |
          helm template cybertwin deploy/helm/cybertwin-soc \
            --set ingress.host=ci.example.com \
            --set serviceMonitor.enabled=true \
            > /tmp/rendered.yaml
          echo "Rendered manifest size:"
          wc -l /tmp/rendered.yaml

      - name: Upload rendered manifest as artefact
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered-${{ github.sha }}
          path: /tmp/rendered.yaml
          retention-days: 14
