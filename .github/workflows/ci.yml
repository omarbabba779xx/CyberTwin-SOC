name: CyberTwin SOC CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    name: Backend Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=backend --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  postgres-migration:
    runs-on: ubuntu-latest
    name: PostgreSQL Migration Smoke
    # Proves the SQLAlchemy schema and Alembic migrations apply cleanly to a
    # real PostgreSQL 16 instance — both forward AND backward — and that all
    # expected indexes are created. Tests still run on SQLite (cheaper); this
    # job is the production-DB safety net.

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cybertwin
          POSTGRES_PASSWORD: cybertwin
          POSTGRES_DB: cybertwin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://cybertwin:cybertwin@localhost:5432/cybertwin_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 15); do
            pg_isready -h localhost -p 5432 -U cybertwin && exit 0
            sleep 2
          done
          echo "PostgreSQL did not become ready in time."
          exit 1

      - name: Apply migrations forward (alembic upgrade head)
        run: alembic upgrade head

      - name: Verify all expected tables exist
        run: |
          python -c "
          import os
          from sqlalchemy import create_engine, inspect
          engine = create_engine(os.environ['DATABASE_URL'])
          insp = inspect(engine)
          tables = set(insp.get_table_names())
          expected = {'simulation_runs', 'security_events', 'alerts', 'soc_cases',
                      'case_comments', 'case_evidence', 'alert_feedback',
                      'suppressions', 'audit_log', 'alembic_version'}
          missing = expected - tables
          assert not missing, f'Missing tables: {missing}. Found: {sorted(tables)}'
          print(f'OK: {len(tables)} tables created.')
          "

      - name: Verify tenant_id index coverage
        run: |
          python -c "
          import os
          from sqlalchemy import create_engine, inspect
          engine = create_engine(os.environ['DATABASE_URL'])
          insp = inspect(engine)
          gaps = []
          for tbl in insp.get_table_names():
              if tbl == 'alembic_version':
                  continue
              cols = {c['name'] for c in insp.get_columns(tbl)}
              if 'tenant_id' not in cols:
                  continue
              indexes = insp.get_indexes(tbl)
              covered = any('tenant_id' in idx['column_names'] for idx in indexes)
              if not covered:
                  gaps.append(tbl)
          assert not gaps, f'Tables missing tenant_id index: {gaps}'
          print('OK: every tenant_id column is indexed.')
          "

      - name: Roll back fully (alembic downgrade base)
        run: alembic downgrade base

      - name: Re-apply forward (idempotency check)
        run: alembic upgrade head

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          echo "Bundle sizes:"
          du -sh dist/assets/*.js dist/assets/*.css

      - name: Lighthouse CI (frontend perf/a11y/best-practices)
        working-directory: frontend
        # Soft-fail today: gate hardens in v3.2 once perf budget is locked.
        continue-on-error: true
        run: |
          npm install --no-save @lhci/cli@0.14.x
          npx lhci autorun --config=.lighthouserc.json || true

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ github.sha }}
          path: frontend/.lighthouseci/
          retention-days: 14
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    name: Code Quality

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install flake8 black --quiet

      - name: Check formatting (black) [warn-only for now]
        # TODO: drop continue-on-error once the codebase is fully reformatted.
        run: black --check --line-length 120 backend/
        continue-on-error: true

      - name: Lint (flake8)
        # Ignored:
        #   E501 long line (handled separately via max-line-length)
        #   W503 line break before binary operator (PEP8 reversed its stance)
        #   E402 module-level import not at top (needed for sys.path setup)
        #   E241 multiple spaces after ',' (intentional in tabular MITRE catalog)
        #   E231 missing whitespace after ',' (intentional in mitre/generate_bundle)
        #   E704 statement on same line as def (intentional for abstract method stubs)
        #   E704/E241/E231 flagged code is reviewed and intentional;
        #   real bugs (F4xx/F5xx/F6xx/F8xx, E741) ARE enforced.
        run: flake8 backend/ --max-line-length=120 --ignore=E501,W503,E402,E241,E231,E704 --count

  security:
    runs-on: ubuntu-latest
    name: Security Scans
    permissions:
      contents: read
      security-events: write   # for SARIF upload

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python scanners
        run: pip install bandit pip-audit cyclonedx-bom --quiet

      - name: Bandit — Python static security analysis (informational)
        # NOTE: 5 medium findings are reviewed false positives — see
        # docs/proof/security-scan-summary.md. Will become blocking once
        # Bandit high-confidence is baseline-clean.
        run: bandit -r backend/ -ll --skip B101,B104 -f txt || true

      - name: pip-audit — CVE scan on Python dependencies (BLOCKING)
        # Baseline: 0 known CVEs after the Apr 2026 dependency upgrade.
        # If a new CVE is published in any pinned version, this gate will
        # fail the build, forcing a bump. See docs/proof/security-scan-summary.md.
        run: pip-audit -r requirements.txt --strict

      - name: Semgrep — multi-language SAST (Python + JS)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep:latest \
            semgrep --config=p/security-audit \
                    --config=p/python \
                    --config=p/javascript \
                    --error || true

      - name: Gitleaks — secret scanning (BLOCKING)
        # Any secret matching the rules in .gitleaks.toml fails the build.
        # Baseline: 0 verified secrets after the JWT-secret incident fix.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: npm audit — frontend dependencies (BLOCKING on high+)
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Trivy — filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: CycloneDX SBOM — Python
        run: cyclonedx-py requirements -i requirements.txt -o sbom-python.json --output-format json || true

      - name: CycloneDX SBOM — Frontend
        working-directory: frontend
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json || true

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-python.json
            sbom-frontend.json
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Create compose .env
        # `.env` is git-ignored. We create a stub so the compose env_file
        # directive is satisfied and the production safety gate has strong
        # test-only secrets during the compose smoke run.
        run: |
          cat > .env <<'EOF'
          ENV=production
          JWT_SECRET=ci-only-secret-for-compose-validation-0000000000000000000000000000
          AUTH_ADMIN_PASSWORD=ci-admin-password-0000
          AUTH_ANALYST_PASSWORD=ci-analyst-password-0000
          AUTH_VIEWER_PASSWORD=ci-viewer-password-0000
          EOF

      - name: Validate compose config
        # Fails fast on typos / unknown keys / variable interpolation errors
        # before we waste time on `build`.
        run: |
          docker compose config > /dev/null
          docker compose --profile soar config > /dev/null
          echo "All compose configurations are valid."

      - name: Build default stack
        run: docker compose build

      - name: Start default stack
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health > /dev/null; then
              echo "Backend is healthy after ${i} attempt(s)."
              exit 0
            fi
            echo "::group::Attempt ${i}/30 - waiting 5s for backend..."
            docker compose ps
            docker compose logs backend --tail=20 || true
            echo "::endgroup::"
            sleep 5
          done
          echo "Backend did not become healthy in time."
          exit 1

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost/health > /dev/null; then
              echo "Frontend is healthy after ${i} attempt(s)."
              exit 0
            fi
            echo "Attempt ${i}/12 - waiting 5s for frontend (port 80→8080)..."
            sleep 5
          done
          echo "Frontend did not become healthy in time."
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::backend logs"
          docker compose logs backend --tail=200 || true
          echo "::endgroup::"
          echo "::group::frontend logs"
          docker compose logs frontend --tail=200 || true
          echo "::endgroup::"
          echo "::group::redis logs"
          docker compose logs redis --tail=100 || true
          echo "::endgroup::"
          docker compose ps

      - name: Stop services
        if: always()
        run: docker compose down -v

  helm-lint:
    runs-on: ubuntu-latest
    name: Helm Chart Validation
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: helm lint deploy/helm/cybertwin-soc

      - name: Render Helm templates (smoke test)
        run: |
          helm template cybertwin deploy/helm/cybertwin-soc \
            --set ingress.host=ci.example.com \
            --set serviceMonitor.enabled=true \
            > /tmp/rendered.yaml
          echo "Rendered manifest size:"
          wc -l /tmp/rendered.yaml

      - name: Upload rendered manifest as artefact
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered-${{ github.sha }}
          path: /tmp/rendered.yaml
          retention-days: 14

  checkov:
    runs-on: ubuntu-latest
    name: Checkov IaC Security Scan
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Dockerfile and Docker Compose
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,secrets
          quiet: true
          soft_fail: true

      - name: Run Checkov on Helm templates
        uses: bridgecrewio/checkov-action@master
        with:
          directory: deploy/helm
          framework: helm
          quiet: true
          soft_fail: true

  # ---------------------------------------------------------------------------
  # Final quality gate — all required jobs must pass before merging to master
  # ---------------------------------------------------------------------------
  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate
    needs:
      - backend-tests
      - postgres-migration
      - frontend-build
      - lint
      - security
      - docker
      - helm-lint

    steps:
      - name: All required quality gates passed
        run: |
          echo "=========================================="
          echo "  CyberTwin SOC Quality Gate: PASSED"
          echo "=========================================="
          echo "  backend-tests       : OK"
          echo "  postgres-migration  : OK"
          echo "  frontend-build      : OK"
          echo "  lint                : OK"
          echo "  security            : OK"
          echo "  docker              : OK"
          echo "  helm-lint           : OK"
          echo "=========================================="
