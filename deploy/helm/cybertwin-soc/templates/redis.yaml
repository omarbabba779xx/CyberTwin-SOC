{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybertwin-redis
  labels:
    app.kubernetes.io/name: cybertwin-soc
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cybertwin-soc
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cybertwin-soc
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{containerPort: 6379, name: redis}]
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: cybertwin-redis
spec:
  selector:
    app.kubernetes.io/name: cybertwin-soc
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: redis
{{- end }}
