## DO NOT COMMIT this file with real values.
## Apply manually:
##   kubectl create secret generic cybertwin-secrets \
##     --from-literal=JWT_SECRET=$(python -c 'import secrets;print(secrets.token_hex(48))') \
##     --from-literal=AUTH_ADMIN_PASSWORD='strong-pw' \
##     --from-literal=AUTH_ANALYST_PASSWORD='strong-pw' \
##     --from-literal=AUTH_VIEWER_PASSWORD='strong-pw'
##
## This file ships only as a *template* for reference.
{{- if false }}
apiVersion: v1
kind: Secret
metadata:
  name: cybertwin-secrets
type: Opaque
stringData:
  JWT_SECRET: REPLACE_ME_WITH_A_48_CHAR_RANDOM_HEX_STRING
  AUTH_ADMIN_PASSWORD: REPLACE_ME
  AUTH_ANALYST_PASSWORD: REPLACE_ME
  AUTH_VIEWER_PASSWORD: REPLACE_ME
{{- end }}
